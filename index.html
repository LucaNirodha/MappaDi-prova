<div id="gdr-mappa-pioggia" style="display:inline-block; position:relative;">
    <img src="https://i.imgur.com/GmBpgEG.png" alt="Mappa" style="display:block; max-width:100%; height:auto; border:4px solid #6a4625; border-radius:4px; box-shadow:0 10px 30px rgba(0,0,0,0.7);">
    <button id="gdr-master-gear" style="position:absolute; top:10px; right:10px; background:none; border:none; font-size:20px; cursor:pointer; z-index:100; opacity:0.3;">⚙️ Gestione</button>
</div>

<div id="loc-modal" class="modal-overlay">
    <div class="modal-content">
        <button class="close-btn" id="modal-close-trigger">Chiudi X</button>
        <div class="modal-header"><h2 id="m-title"></h2></div>
        <img id="m-img" class="location-image" src="" alt="Luogo">
        <div class="tabs">
            <button class="tab-btn active" id="t-btn-storia">STORIA</button>
            <button class="tab-btn" id="t-btn-trama">TRAMA</button>
        </div>
        <div id="c-storia" class="tab-content active">
            <textarea class="storia-area" id="t-storia" placeholder="Storia..." readonly></textarea>
        </div>
        <div id="c-trama" class="tab-content">
            <textarea class="trama-area" id="t-trama" placeholder="Trama..." readonly></textarea>
            <div class="clues-grid">
                <textarea class="clue-box" id="c-1" placeholder="Indizio 1" readonly></textarea>
                <textarea class="clue-box" id="c-2" placeholder="Indizio 2" readonly></textarea>
                <textarea class="clue-box" id="c-3" placeholder="Indizio 3" readonly></textarea>
                <textarea class="clue-box" id="c-4" placeholder="Indizio 4" readonly></textarea>
            </div>
            <button id="gdr-save-btn" style="width:100%; margin-top:15px; padding:10px; background-color:#2e7d32; color:white; border:2px solid #1b5e20; border-radius:5px; font-weight:bold; cursor:pointer; display:none;">💾 SALVA MODIFICHE ONLINE</button>
        </div>
    </div>
</div>

<style>
    :root {
        --bg-color: #e8e1cd;
        --modal-bg: #f4efdf;
        --primary-brown: #8b5a33;
        --secondary-brown: #b89c80;
        --text-dark: #333;
        --border-color: #6a4625;
        --danger-red: #8a1f1f;
    }
    .territory-btn {
        position: absolute;
        transform: translate(-50%, -50%);
        padding: 8px 16px;
        background-color: rgba(139,90,51,0.85);
        border: 2px solid var(--border-color);
        border-radius: 20px;
        cursor: pointer;
        font-weight: bold;
        color: white;
        text-shadow: 1px 1px 2px black;
        box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        transition: all 0.2s ease;
        z-index: 10;
    }
    .territory-btn:hover {
        background-color: var(--primary-brown);
        transform: translate(-50%, -50%) scale(1.1);
        box-shadow: 0 6px 12px rgba(0,0,0,0.7);
    }
    .modal-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.75);
        justify-content: center;
        align-items: center;
        z-index: 10000;
    }
    .modal-overlay.active {
        display: flex;
    }
    .modal-content {
        background-color: var(--modal-bg);
        width: 600px;
        max-width: 90%;
        border: 4px solid var(--border-color);
        border-radius: 8px;
        padding: 20px;
        position: relative;
        box-shadow: 0 5px 25px rgba(0,0,0,0.6);
        color: var(--text-dark);
        font-family: sans-serif;
    }
    .close-btn {
        position: absolute;
        top: 15px;
        right: 15px;
        background-color: var(--danger-red);
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
    }
    .modal-header h2 {
        text-align: center;
        margin: 0 0 15px 0;
        color: var(--border-color);
        border-bottom: 2px solid var(--border-color);
        padding-bottom: 10px;
        font-size: 24px;
    }
    .location-image {
        width: 100%;
        height: 220px;
        object-fit: cover;
        border: 3px solid var(--border-color);
        border-radius: 5px;
        margin-bottom: 15px;
    }
    .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
    }
    .tab-btn {
        flex: 1;
        padding: 12px;
        background-color: var(--secondary-brown);
        border: 2px solid var(--border-color);
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        color: white;
        font-size: 14px;
    }
    .tab-btn.active {
        background-color: var(--primary-brown);
    }
    .tab-content {
        display: none;
    }
    .tab-content.active {
        display: block;
    }
    textarea {
        width: 100%;
        box-sizing: border-box;
        background-color: var(--bg-color);
        border: 2px solid var(--border-color);
        border-radius: 5px;
        padding: 15px;
        font-family: inherit;
        font-size: 14px;
        resize: none;
        color: var(--text-dark);
        line-height: 1.4;
    }
    .storia-area {
        height: 180px;
    }
    .trama-area {
        height: 110px;
        margin-bottom: 12px;
    }
    .clues-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }
    .clue-box {
        height: 70px;
    }
</style>

<script>
(function(){
    var isMasterMode = false;
    var currentId = "";
    
    // =========================================================================
    // 1. INCOLLA QUI LA TUA MASTER KEY (sostituisci il testo tra le virgolette)
    // =========================================================================
    var API_KEY = "$2a$10$NNi8R1qnzwGu64GesdAhaOF/x87LxLfTxK9flwDA7GVZZOqMSYqIK"; 
    var BIN_ID = "6a525173f5f4af5e2981100f"; 
    // =========================================================================

    var territories = {
        "centro": { name: "Centro del Paese", top: "52%", left: "51%", image: "https://via.placeholder.com/600x220", storia: "", trama: "", indizi: ["","","",""] },
        "kokei": { name: "K\u014dkei", top: "37%", left: "27%", image: "https://via.placeholder.com/600x220", storia: "", trama: "", indizi: ["","","",""] },
        "nord_verde": { name: "Territorio Nord Verde", top: "15%", left: "33%", image: "https://via.placeholder.com/600x220", storia: "", trama: "", indizi: ["","","",""] },
        "nord_marrone": { name: "Territorio Nord Marrone", top: "14%", left: "71%", image: "https://via.placeholder.com/600x220", storia: "", trama: "", indizi: ["","","",""] },
        "est_arancio": { name: "Territorio Est", top: "49%", left: "89%", image: "https://via.placeholder.com/600x220", storia: "", trama: "", indizi: ["","","",""] },
        "sud_arancio": { name: "Territorio Sud", top: "88%", left: "50%", image: "https://via.placeholder.com/600x220", storia: "", trama: "", indizi: ["","","",""] },
        "ovest_giallo": { name: "Territorio Ovest", top: "58%", left: "10%", image: "https://via.placeholder.com/600x220", storia: "", trama: "", indizi: ["","","",""] },
        "bordo_nord_ovest": { name: "Confine Nord-Ovest", top: "13%", left: "9%", image: "https://via.placeholder.com/600x220", storia: "", trama: "", indizi: ["","","",""] },
        "bordo_nord": { name: "Terre del Nord", top: "2%", left: "50%", image: "https://via.placeholder.com/600x220", storia: "", trama: "", indizi: ["","","",""] },
        "bordo_est": { name: "Terre dell'Est", top: "45%", left: "98%", image: "https://via.placeholder.com/600x220", storia: "", trama: "", indizi: ["","","",""] },
        "bordo_sud_ovest": { name: "Confine Sud-Ovest", top: "92%", left: "8px", image: "https://via.placeholder.com/600x220", storia: "", trama: "", indizi: ["","","",""] },
        "bordo_sud_est": { name: "Confine Sud-Est", top: "93%", left: "86%", image: "https://via.placeholder.com/600x220", storia: "", trama: "", indizi: ["","","",""] }
    };

    var container = document.getElementById("gdr-mappa-pioggia");
    
    Object.keys(territories).forEach(function(id){
        var t = territories[id];
        var btn = document.createElement("button");
        btn.className = "territory-btn";
        btn.innerText = t.name;
        btn.style.top = t.top;
        btn.style.left = t.left;
        btn.onclick = function(){ openModal(id) };
        container.appendChild(btn);
    });

    function scaricaDatabase() {
        if (!BIN_ID) return; 
        var xhr = new XMLHttpRequest();
        xhr.open("GET", "https://api.jsonbin.io/v3/b/" + BIN_ID + "/latest", true);
        
        xhr.setRequestHeader("X-Master-Key", API_KEY);
        
        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4 && xhr.status === 200) {
                var res = JSON.parse(xhr.responseText);
                // RETE DI SICUREZZA: Aggiorna solo se c'è davvero la mappa nel database!
                if(res.record && res.record.centro) {
                    territories = res.record;
                }
            }
        };
        xhr.send();
    }

    function salvaDatabase() {
        if(!currentId || !BIN_ID) return;
        
        territories[currentId].storia = document.getElementById("t-storia").value;
        territories[currentId].trama = document.getElementById("t-trama").value;
        territories[currentId].indizi[0] = document.getElementById("c-1").value;
        territories[currentId].indizi[1] = document.getElementById("c-2").value;
        territories[currentId].indizi[2] = document.getElementById("c-3").value;
        territories[currentId].indizi[3] = document.getElementById("c-4").value;

        document.getElementById("gdr-save-btn").innerText = "🔄 SALVATAGGIO IN CORSO...";

        var xhr = new XMLHttpRequest();
        xhr.open("PUT", "https://api.jsonbin.io/v3/b/" + BIN_ID, true);
        
        xhr.setRequestHeader("Content-Type", "application/json");
        xhr.setRequestHeader("X-Master-Key", API_KEY);
        
        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
                if(xhr.status === 200) {
                    alert("✨ Modifiche salvate nel database con successo!");
                } else {
                    alert("Errore di salvataggio. Codice errore di risposta: " + xhr.status);
                }
                document.getElementById("gdr-save-btn").innerText = "💾 SALVA MODIFICHE ONLINE";
            }
        };
        xhr.send(JSON.stringify(territories));
    }

    function toggleMasterMode(){
        isMasterMode = !isMasterMode;
        document.getElementById("gdr-master-gear").style.opacity = isMasterMode ? "1" : "0.3";
        document.getElementById("gdr-save-btn").style.display = isMasterMode ? "block" : "none";
        
        var fields = ["t-storia", "t-trama", "c-1", "c-2", "c-3", "c-4"];
        fields.forEach(function(fId){
            document.getElementById(fId).readOnly = !isMasterMode;
        });
        alert(isMasterMode ? "Pannello di Modifica Sbloccato!" : "Modalità Visualizzazione.");
    }

    function openModal(id){
        currentId = id;
        var t = territories[id];
        document.getElementById("m-title").innerText = t.name;
        document.getElementById("m-img").src = t.image;
        document.getElementById("t-storia").value = t.storia || "";
        document.getElementById("t-trama").value = t.trama || "";
        document.getElementById("c-1").value = t.indizi[0] || "";
        document.getElementById("c-2").value = t.indizi[1] || "";
        document.getElementById("c-3").value = t.indizi[2] || "";
        document.getElementById("c-4").value = t.indizi[3] || "";
        switchTab("storia");
        document.getElementById("loc-modal").classList.add("active");
    }

    function closeModal(){
        document.getElementById("loc-modal").classList.remove("active");
    }

    function switchTab(tab){
        var bS = document.getElementById("t-btn-storia");
        var bT = document.getElementById("t-btn-trama");
        var cS = document.getElementById("c-storia");
        var cT = document.getElementById("c-trama");
        if(tab === "storia"){
            bS.classList.add("active"); bT.classList.remove("active");
            cS.classList.add("active"); cT.classList.remove("active");
        } else {
            bT.classList.add("active"); bS.classList.remove("active");
            cT.classList.add("active"); cS.classList.remove("active");
        }
    }

    document.getElementById("gdr-master-gear").onclick = toggleMasterMode;
    document.getElementById("modal-close-trigger").onclick = closeModal;
    document.getElementById("t-btn-storia").onclick = function(){ switchTab("storia") };
    document.getElementById("t-btn-trama").onclick = function(){ switchTab("trama") };
    document.getElementById("gdr-save-btn").onclick = salvaDatabase;

    scaricaDatabase();
})();
</script>
